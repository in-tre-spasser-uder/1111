<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>最简单的文件预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui;
            background: #f0f2f5;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #333;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-icon {
            font-size: 24px;
        }

        .file-name {
            color: #333;
        }

        .preview-btn {
            padding: 6px 16px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .preview-btn:hover {
            background: #40a9ff;
        }

        /* 预览模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
        }

        .modal.show {
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            height: 50px;
            background: #1f1f1f;
            color: white;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .close-btn {
            padding: 4px 12px;
            background: #333;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .modal-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        iframe,
        img,
        video {
            max-width: 100%;
            max-height: 80vh;
        }

        .error {
            background: white;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📁 最简单的文件预览示例</h1>
        <div id="fileList">加载中...</div>
    </div>

    <!-- 预览弹窗 -->
    <div class="modal" id="previewModal">
        <div class="modal-header">
            <span id="modalTitle">文件预览</span>
            <button class="close-btn" onclick="closePreview()">关闭</button>
        </div>
        <div class="modal-body" id="modalContent">
            <!-- 预览内容会显示在这里 -->
        </div>
    </div>

    <script>
        // 加载文件列表
        fetch('files.json')
            .then(res => res.json())
            .then(data => {
                const html = data.files.map(file => `
                    <div class="file-item">
                        <div class="file-info">
                            <span class="file-icon">${getIcon(file.name)}</span>
                            <span class="file-name">${file.name}</span>
                        </div>
                        <button class="preview-btn" onclick="previewFile('${file.url}', '${file.name}')">预览</button>
                    </div>
                `).join('');
                document.getElementById('fileList').innerHTML = html;
            })
            .catch(err => {
                document.getElementById('fileList').innerHTML = '加载失败：' + err.message;
            });

        // 预览文件
        function previewFile(url, name) {
            const modal = document.getElementById('previewModal');
            const content = document.getElementById('modalContent');
            const title = document.getElementById('modalTitle');

            title.textContent = name;
            modal.classList.add('show');

            const ext = name.split('.').pop().toLowerCase();

            if (['jpg', 'jpeg', 'png', 'gif'].includes(ext)) {
                content.innerHTML = `<img src="${url}" alt="${name}">`;
            } else if (ext === 'pdf') {
                content.innerHTML = `<iframe src="${url}" width="100%" height="600"></iframe>`;
            } else if (['mp4', 'webm'].includes(ext)) {
                content.innerHTML = `<video src="${url}" controls></video>`;
            } else if (['mp3', 'wav'].includes(ext)) {
                content.innerHTML = `<audio src="${url}" controls></audio>`;
            } else {
                content.innerHTML = `
                    <div class="error">
                        <p>暂不支持预览该文件类型</p>
                        <a href="${url}" download style="margin-top:15px;display:inline-block;padding:8px 24px;background:#1890ff;color:white;text-decoration:none;border-radius:4px;">下载文件</a>
                    </div>
                `;
            }
        }

        // 关闭预览
        function closePreview() {
            const modal = document.getElementById('previewModal');
            modal.classList.remove('show');
            document.getElementById('modalContent').innerHTML = '';
        }

        // 获取文件图标
        function getIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'pdf': '📕', 'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️',
                'mp4': '🎬', 'mp3': '🎵', 'txt': '📄'
            };
            return icons[ext] || '📄';
        }
    </script>
</body>

</html>

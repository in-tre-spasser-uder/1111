<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truderin 的专升本资料库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background-color: #f0f2f5;
            padding: 20px;
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
            position: relative;
        }

        .header h1 {
            color: #2d3748;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #718096;
            font-size: 16px;
        }

        /* 返回主页链接 */
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .back-link a {
            color: #4299e1;
            text-decoration: none;
            padding: 6px 12px;
            border: 1px solid #4299e1;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .back-link a:hover {
            background: #4299e1;
            color: white;
        }

        /* 文件列表网格 */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .file-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #e2e8f0;
        }

        .file-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-color: #4299e1;
        }

        .file-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .file-name {
            font-size: 14px;
            color: #2d3748;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .file-info {
            font-size: 12px;
            color: #718096;
            margin-top: 5px;
        }

        /* 预览模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
        }

        .modal.show {
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            height: 60px;
            background: #1a202c;
            color: white;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 {
            font-size: 16px;
            font-weight: 400;
        }

        .close-btn {
            padding: 6px 16px;
            background: #4a5568;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .close-btn:hover {
            background: #718096;
        }

        .modal-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: auto;
        }

        /* 预览内容样式 */
        .pdf-preview iframe {
            width: 100%;
            height: 80vh;
            border: none;
            background: white;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
        }

        .video-preview video {
            max-width: 100%;
            max-height: 80vh;
        }

        .audio-preview audio {
            width: 500px;
            max-width: 100%;
        }

        .text-preview pre {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 800px;
            max-height: 80vh;
            overflow: auto;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        .unsupported-preview {
            background: white;
            padding: 40px;
            border-radius: 8px;
            text-align: center;
        }

        .download-btn {
            display: inline-block;
            padding: 8px 24px;
            background: #4299e1;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #718096;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #f56565;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <!-- 网页头部 + 返回链接 -->
        <div class="header">
            <div class="back-link">
                <a href="index.html">← 返回学习笔记</a>
            </div>
            <h1>📚 Truderin 的专升本资料库</h1>
            <p>支持 PDF、图片、视频、音频、文本在线预览</p>
        </div>

        <!-- 文件列表网格 -->
        <div class="file-grid" id="fileGrid">
            <div class="loading">加载文件中...</div>
        </div>
    </div>

    <!-- 预览模态框 -->
    <div class="modal" id="previewModal">
        <div class="modal-header">
            <h3 id="modalTitle">文件预览</h3>
            <button class="close-btn" onclick="closePreview()">关闭</button>
        </div>
        <div class="modal-body" id="modalContent"></div>
    </div>

    <script>
        // 加载文件列表
        async function loadFiles() {
            try {
                const response = await fetch('files.json');
                const data = await response.json();

                const grid = document.getElementById('fileGrid');

                if (!data.files || data.files.length === 0) {
                    grid.innerHTML = '<div class="error">暂无文件</div>';
                    return;
                }

                grid.innerHTML = data.files.map(file => `
                    <div class="file-item" onclick="previewFile('${file.url}', '${file.name}')">
                        <div class="file-icon">${getFileIcon(file.name)}</div>
                        <div class="file-name">${file.name}</div>
                        <div class="file-info">${file.size || ''}</div>
                    </div>
                `).join('');

            } catch (error) {
                document.getElementById('fileGrid').innerHTML = '<div class="error">加载失败，请检查 files.json 是否存在</div>';
                console.error('加载失败:', error);
            }
        }

        // 预览文件
        function previewFile(url, name) {
            const modal = document.getElementById('previewModal');
            const content = document.getElementById('modalContent');
            const title = document.getElementById('modalTitle');

            title.textContent = name;
            modal.classList.add('show');

            const ext = name.split('.').pop().toLowerCase();

            // 图片预览
            if (['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp'].includes(ext)) {
                content.innerHTML = `<div class="image-preview"><img src="${url}" alt="${name}"></div>`;
            }
            // PDF预览
            else if (ext === 'pdf') {
                content.innerHTML = `<div class="pdf-preview"><iframe src="${url}"></iframe></div>`;
            }
            // 视频预览
            else if (['mp4', 'webm', 'ogg', 'mov'].includes(ext)) {
                content.innerHTML = `<div class="video-preview"><video src="${url}" controls></video></div>`;
            }
            // 音频预览
            else if (['mp3', 'wav', 'ogg', 'm4a'].includes(ext)) {
                content.innerHTML = `<div class="audio-preview"><audio src="${url}" controls></audio></div>`;
            }
            // 文本预览
            else if (['txt', 'js', 'html', 'css', 'json', 'md'].includes(ext)) {
                fetch(url)
                    .then(res => res.text())
                    .then(text => {
                        content.innerHTML = `<div class="text-preview"><pre>${escapeHtml(text)}</pre></div>`;
                    })
                    .catch(() => {
                        content.innerHTML = '<div class="error">文本加载失败</div>';
                    });
                content.innerHTML = '<div class="loading">加载中...</div>';
            }
            // 不支持的文件类型
            else {
                content.innerHTML = `
                    <div class="unsupported-preview">
                        <div style="font-size:48px;margin-bottom:20px;">📄</div>
                        <h3>无法预览该文件类型</h3>
                        <p>${name}</p>
                        <a href="${url}" download class="download-btn">下载文件</a>
                    </div>
                `;
            }
        }

        // 关闭预览
        function closePreview() {
            const modal = document.getElementById('previewModal');
            modal.classList.remove('show');
            document.getElementById('modalContent').innerHTML = '';
        }

        // 获取文件图标
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'pdf': '📕', 'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️', 'gif': '🖼️',
                'mp4': '🎬', 'mp3': '🎵', 'txt': '📄', 'doc': '📝', 'docx': '📝',
                'ppt': '📽️', 'pptx': '📽️', 'xls': '📊', 'xlsx': '📊'
            };
            return icons[ext] || '📄';
        }

        // 转义HTML
        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        // 页面加载时显示文件
        document.addEventListener('DOMContentLoaded', loadFiles);
    </script>
</body>

</html>

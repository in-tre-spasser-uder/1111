    <div class="page-container">
        <div class="video-main">
            <div class="video-header" style="margin-bottom:8px;">
                <h1 style="font-size:20px;" id="currentVideoTitle">选择下方课时开始观看</h1>
            </div>

            <!-- 播放器区域：仅保留bilibili嵌入，因为本地视频不存在，完全使用B站源 -->
            <div class="video-player-wrapper" id="playerWrapper">
                <!-- 原生video容器 (本地视频不使用，默认隐藏) -->
                <div class="container show-controls" id="videoContainer" style="display: none;">
                    <video id="mainVideo" src="" preload="auto" playsinline></video>
                    <!-- 控件保留但无用，隐藏 -->
                </div>
                <!-- b站嵌入容器 (默认显示) -->
                <div class="bilibili-embed" id="bilibiliContainer" style="display: block;">
                    <iframe id="bilibiliIframe" src="" allowfullscreen="true" scrolling="no" frameborder="0"
                        sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
                </div>
            </div>

            <!-- 无手动输入区，所有数据内嵌 -->

            <div class="status-bar">
                <span><i class="fa-regular fa-circle-play"></i> 点击课时直接播放对应分P</span>
                <span id="mirrorStatus" style="display:none;"></span>
                <span id="loopStatus" style="display:none;"></span>

            </div>

                </ul>
                <div class="pagination-bar">
                    <button class="page-btn" id="prevPageBtn" disabled><i class="fa-solid fa-chevron-left"></i>

                    <div class="page-input-container"><i class="fa-regular fa-book-open"></i><input type="number"
                            id="pageInput" class="page-input" min="1" max="11" value="1" step="1"><span
                            class="page-total">/ 11章</span></div>
                    <button class="page-btn" id="nextPageBtn">下一章 <i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="sidebar-footer-note"><i class="fa-regular fa-lightbulb"></i> 内嵌92条课时数据，点击即播对应B站分P。</div>
        </div>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truderin 的文件预览库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background-color: #f0f2f5;
            padding: 20px;
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .header h1 {
            color: #2d3748;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #718096;
            font-size: 16px;
        }

        /* 文件列表样式 */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .file-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #e2e8f0;
        }

        .file-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-color: #4299e1;
        }

        .file-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .file-name {
            font-size: 14px;
            color: #2d3748;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .file-info {
            font-size: 12px;
            color: #718096;
            margin-top: 5px;
        }

        /* 文件夹样式 */
        .folder .file-icon {
            color: #ecc94b;
        }

        /* 预览模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
        }

        .modal.show {
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            height: 60px;
            background: #1a202c;
            color: white;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 {
            font-size: 16px;
            font-weight: 400;
        }

        .close-btn {
            padding: 6px 16px;
            background: #4a5568;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .close-btn:hover {
            background: #718096;
        }

        .modal-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: auto;
        }

        /* 预览内容样式 */
        .pdf-preview iframe {
            width: 100%;
            height: 80vh;
            border: none;
            background: white;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
        }

        .video-preview video {
            max-width: 100%;
            max-height: 80vh;
        }

        .audio-preview audio {
            width: 500px;
            max-width: 100%;
        }

        .text-preview pre {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 800px;
            max-height: 80vh;
            overflow: auto;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        .unsupported-preview {
            background: white;
            padding: 40px;
            border-radius: 8px;
            text-align: center;
        }

        .unsupported-preview p {
            margin: 20px 0;
            color: #718096;
        }

        .download-btn {
            display: inline-block;
            padding: 8px 24px;
            background: #4299e1;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #718096;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #f56565;
        }

        /* 路径导航 */
        .path-bar {
            padding: 15px 20px;
            background: #f8f9fa;
            border-radius: 6px;
            margin: 20px 0;
            font-size: 14px;
        }

        .path-bar a {
            color: #4299e1;
            cursor: pointer;
            text-decoration: none;
        }

        .path-bar a:hover {
            text-decoration: underline;
        }

        .path-bar span {
            color: #718096;
            margin: 0 5px;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <!-- 网页头部 -->
        <div class="header">
            <h1>Truderin 的文件预览库</h1>
            <p>支持 PDF、图片、视频、音频、文本在线预览</p>
        </div>

        <!-- 路径导航 -->
        <div class="path-bar" id="pathBar">
            <a onclick="loadFiles('')">根目录</a>
        </div>

        <!-- 文件列表网格 -->
        <div class="file-grid" id="fileGrid">
            <div class="loading">加载文件中...</div>
        </div>
    </div>

    <!-- 预览模态框 -->
    <div class="modal" id="previewModal">
        <div class="modal-header">
            <h3 id="modalTitle">文件预览</h3>
            <button class="close-btn" onclick="closePreview()">关闭</button>
        </div>
        <div class="modal-body" id="modalContent">
            <!-- 预览内容会动态插入这里 -->
        </div>
    </div>

    <script>
        // 当前路径
        let currentPath = '';

        // 文件数据结构
        const fileData = {
            "files": [
                {
                    "name": "示例文件.pdf",
                    "url": "files/示例文件.pdf",
                    "type": "file",
                    "size": "2.3 MB"
                },
                {
                    "name": "示例图片.jpg",
                    "url": "files/示例图片.jpg",
                    "type": "file",
                    "size": "1.1 MB"
                },
                {
                    "name": "示例视频.mp4",
                    "url": "files/示例视频.mp4",
                    "type": "file",
                    "size": "15.6 MB"
                },
                {
                    "name": "示例音频.mp3",
                    "url": "files/示例音频.mp3",
                    "type": "file",
                    "size": "3.4 MB"
                },
                {
                    "name": "示例文档.txt",
                    "url": "files/示例文档.txt",
                    "type": "file",
                    "size": "45 KB"
                }
            ],
            "folders": [
                {
                    "name": "专升本资料",
                    "path": "zhuanshengben",
                    "children": []
                },
                {
                    "name": "Python笔记",
                    "path": "python",
                    "children": []
                },
                {
                    "name": "前端学习",
                    "path": "frontend",
                    "children": []
                }
            ]
        };

        // 加载文件列表
        function loadFiles(path = '') {
            currentPath = path;
            updatePathBar();

            const grid = document.getElementById('fileGrid');

            // 如果是根目录，显示文件夹和文件
            if (path === '') {
                const foldersHtml = fileData.folders.map(folder => `
                    <div class="file-item folder" onclick="loadFiles('${folder.path}')">
                        <div class="file-icon">📁</div>
                        <div class="file-name">${folder.name}</div>
                        <div class="file-info">文件夹</div>
                    </div>
                `).join('');

                const filesHtml = fileData.files.map(file => `
                    <div class="file-item" onclick="previewFile('${file.url}', '${file.name}')">
                        <div class="file-icon">${getFileIcon(file.name)}</div>
                        <div class="file-name">${file.name}</div>
                        <div class="file-info">${file.size || ''}</div>
                    </div>
                `).join('');

                grid.innerHTML = foldersHtml + filesHtml;
            } else {
                // 如果是子目录，这里可以添加对应文件夹的内容
                grid.innerHTML = `
                    <div class="file-item folder" onclick="loadFiles('')">
                        <div class="file-icon">📁</div>
                        <div class="file-name">返回根目录</div>
                        <div class="file-info">上级</div>
                    </div>
                    <div class="file-item" onclick="previewFile('files/示例文件.pdf', '示例文件.pdf')">
                        <div class="file-icon">📕</div>
                        <div class="file-name">示例文件.pdf</div>
                        <div class="file-info">2.3 MB</div>
                    </div>
                `;
            }
        }

        // 预览文件
        function previewFile(url, name) {
            const modal = document.getElementById('previewModal');
            const content = document.getElementById('modalContent');
            const title = document.getElementById('modalTitle');

            title.textContent = name;
            modal.classList.add('show');

            const ext = name.split('.').pop().toLowerCase();

            // 图片预览
            if (['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp'].includes(ext)) {
                content.innerHTML = `<div class="image-preview"><img src="${url}" alt="${name}"></div>`;
            }
            // PDF预览
            else if (ext === 'pdf') {
                content.innerHTML = `<div class="pdf-preview"><iframe src="${url}"></iframe></div>`;
            }
            // 视频预览
            else if (['mp4', 'webm', 'ogg', 'mov'].includes(ext)) {
                content.innerHTML = `<div class="video-preview"><video src="${url}" controls></video></div>`;
            }
            // 音频预览
            else if (['mp3', 'wav', 'ogg', 'm4a'].includes(ext)) {
                content.innerHTML = `<div class="audio-preview"><audio src="${url}" controls></audio></div>`;
            }
            // 文本预览
            else if (['txt', 'js', 'html', 'css', 'json', 'md'].includes(ext)) {
                fetch(url)
                    .then(res => res.text())
                    .then(text => {
                        content.innerHTML = `<div class="text-preview"><pre>${escapeHtml(text)}</pre></div>`;
                    })
                    .catch(() => {
                        content.innerHTML = '<div class="error">文本加载失败</div>';
                    });
                content.innerHTML = '<div class="loading">加载中...</div>';
            }
            // 不支持的文件类型
            else {
                content.innerHTML = `
                    <div class="unsupported-preview">
                        <div style="font-size:48px;margin-bottom:20px;">📄</div>
                        <h3>无法预览该文件类型</h3>
                        <p>${name}</p>
                        <a href="${url}" download class="download-btn">下载文件</a>
                    </div>
                `;
            }
        }

        // 关闭预览
        function closePreview() {
            const modal = document.getElementById('previewModal');
            modal.classList.remove('show');
            document.getElementById('modalContent').innerHTML = '';
        }

        // 更新路径导航
        function updatePathBar() {
            const pathBar = document.getElementById('pathBar');
            if (!currentPath) {
                pathBar.innerHTML = '<a onclick="loadFiles(\'\')">根目录</a>';
                return;
            }

            pathBar.innerHTML = `
                <a onclick="loadFiles('')">根目录</a>
                <span>/</span>
                <a onclick="loadFiles('${currentPath}')">${currentPath}</a>
            `;
        }

        // 获取文件图标
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'pdf': '📕', 'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️', 'gif': '🖼️',
                'mp4': '🎬', 'mp3': '🎵', 'txt': '📄', 'doc': '📝', 'docx': '📝',
                'ppt': '📽️', 'pptx': '📽️', 'xls': '📊', 'xlsx': '📊'
            };
            return icons[ext] || '📄';
        }

        // 转义HTML
        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        // 页面加载时显示文件
        document.addEventListener('DOMContentLoaded', () => {
            loadFiles('');
        });
    </script>
</body>

</html>
